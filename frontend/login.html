<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión — MacWorld Ecuador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}

/* ── TEMA ── */
:root{
  --gold:#C9A227;
  --gold-light:#E8C547;
  --gold-dark:#9A7B1C;
  --bg:#F0F0F2;
  --card:#FFFFFF;
  --border:#E2E2E6;
  --border2:#CACACE;
  --text:#1D1D1F;
  --text-muted:#6E6E73;
  --danger:#E53935;
  --danger-bg:#FDE8E8;
  --success:#2E7D32;
  --success-bg:#E8F5E9;
  --radius:16px;
  --shadow:0 8px 40px rgba(0,0,0,.10);
}

/* ── FONDO ── */
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(201,162,39,.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 90%, rgba(201,162,39,.06) 0%, transparent 60%);
}

/* ── NAVBAR ── */
.navbar{
  width:100%;padding:0 24px;height:64px;display:flex;align-items:center;
  justify-content:space-between;background:rgba(240,240,242,.92);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  position:fixed;top:0;left:0;right:0;z-index:100;
}
.nav-logo{
  font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;
  color:var(--text);text-decoration:none;letter-spacing:.02em;
}
.nav-logo span{color:var(--gold)}
.nav-back{
  display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:500;
  color:var(--text-muted);text-decoration:none;padding:8px 16px;border-radius:50px;
  border:1.5px solid var(--border2);background:var(--card);transition:all .2s;
}
.nav-back:hover{color:var(--gold);border-color:var(--gold);text-decoration:none}

/* ── WRAPPER ── */
.page-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:88px 20px 40px;
}

/* ── CARD ── */
.auth-card{
  width:100%;max-width:440px;background:var(--card);
  border-radius:var(--radius);border:1px solid var(--border);
  box-shadow:var(--shadow);padding:44px 40px;
}
@media(max-width:480px){.auth-card{padding:32px 24px;border-radius:12px}}

/* ── LOGO / TÍTULO ── */
.brand{text-align:center;margin-bottom:32px}
.brand-name{
  font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;
  color:var(--text);letter-spacing:.02em;display:block;margin-bottom:4px;
}
.brand-name span{color:var(--gold)}
.brand-sub{font-size:13px;color:var(--text-muted)}
.brand-divider{
  width:48px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:14px auto 0;border-radius:1px;
}

/* ── FORM ── */
.form-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px}
.form-sub{font-size:14px;color:var(--text-muted);margin-bottom:28px;line-height:1.5}

.form-group{margin-bottom:18px}
.form-group label{
  display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:7px;
}
.form-group input{
  width:100%;padding:13px 16px;border:1.5px solid var(--border2);border-radius:10px;
  font-size:15px;font-family:'Outfit',sans-serif;background:#fff;color:var(--text);
  outline:none;transition:border .2s,box-shadow .2s;
}
.form-group input:focus{
  border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,39,.12);
}
.form-group input::placeholder{color:var(--border2)}

/* ── BOTONES ── */
.btn-submit{
  width:100%;padding:15px;border-radius:50px;font-family:'Outfit',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;border:none;
  background:var(--gold);color:#000;transition:all .25s;margin-top:8px;
  letter-spacing:.02em;
}
.btn-submit:hover{background:var(--gold-light);transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,162,39,.35)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

.btn-ghost{
  width:100%;padding:13px;border-radius:50px;font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;background:transparent;
  color:var(--text-muted);border:1.5px solid var(--border2);transition:all .2s;margin-top:10px;
}
.btn-ghost:hover{border-color:var(--text-muted);color:var(--text)}

.btn-danger{
  width:100%;padding:13px;border-radius:50px;font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;background:transparent;
  color:var(--danger);border:1.5px solid #f5c6c6;transition:all .2s;margin-top:10px;
}
.btn-danger:hover{background:var(--danger-bg);border-color:var(--danger)}

/* ── ALERTAS ── */
.alert{
  padding:13px 16px;border-radius:10px;font-size:14px;
  margin-bottom:20px;display:none;line-height:1.5;
}
.alert.show{display:block}
.alert-error{background:var(--danger-bg);color:#c62828;border:1px solid #f5c6c6}
.alert-success{background:var(--success-bg);color:var(--success);border:1px solid #c8e6c9}

/* ── SESIÓN ACTIVA ── */
.session-box{text-align:center;display:none}
.session-box.show{display:block}
.session-avatar{
  width:72px;height:72px;border-radius:50%;background:rgba(201,162,39,.12);
  border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;
  font-size:28px;margin:0 auto 20px;
}
.session-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
.session-email{font-size:14px;color:var(--text-muted);margin-bottom:6px}
.session-role{
  display:inline-block;padding:4px 12px;border-radius:50px;font-size:12px;font-weight:600;
  background:rgba(201,162,39,.12);color:var(--gold);border:1px solid rgba(201,162,39,.25);
  letter-spacing:.04em;text-transform:uppercase;margin-bottom:28px;
}
.session-role.admin{background:rgba(0,150,80,.1);color:#00a060;border-color:rgba(0,150,80,.25)}

/* ── DIVIDER ── */
.divider{
  display:flex;align-items:center;gap:12px;margin:20px 0;
  font-size:13px;color:var(--text-muted);
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2)}

/* ── FOOTER ── */
.auth-footer{
  text-align:center;font-size:13px;color:var(--text-muted);margin-top:22px;
}
.auth-footer a{color:var(--gold);text-decoration:none;font-weight:600}
.auth-footer a:hover{text-decoration:underline}

/* ── VISTA LOGIN / SESIÓN ── */
#login-view{display:block}
#session-view{display:none}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="/" class="nav-logo">Mac<span>World</span> EC</a>
  <a href="/" class="nav-back">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Volver a la tienda
  </a>
</nav>

<div class="page-wrap">
  <div class="auth-card">

    <!-- MARCA -->
    <div class="brand">
      <span class="brand-name">Mac<span>World</span> EC</span>
      <span class="brand-sub">Apple Premium Store Ecuador</span>
      <div class="brand-divider"></div>
    </div>

    <!-- ── VISTA: FORMULARIO DE LOGIN ── -->
    <div id="login-view">
      <p class="form-title">Iniciar sesión</p>
      <p class="form-sub">Accede a tu cuenta para ver tu historial de pedidos</p>

      <div class="alert alert-error" id="error-msg"></div>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email"
                 placeholder="tu@correo.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password"
                 placeholder="Tu contraseña" required autocomplete="current-password" minlength="6">
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">Ingresar</button>
      </form>

      <p class="auth-footer">
        ¿No tienes cuenta? <a href="/register.html">Crear cuenta gratis</a>
      </p>
    </div>

    <!-- ── VISTA: SESIÓN ACTIVA ── -->
    <div id="session-view">
      <div class="session-box show">
        <div class="session-avatar">👤</div>
        <p class="session-name" id="sess-name"></p>
        <p class="session-email" id="sess-email"></p>
        <span class="session-role" id="sess-role"></span>

        <button class="btn-submit" id="btn-go-dest">Ir al panel admin</button>
        <button class="btn-ghost" id="btn-go-home">Ir a la tienda</button>

        <div class="divider">o</div>

        <button class="btn-danger" id="btn-logout">Cerrar sesión</button>
      </div>
    </div>

  </div>
</div>

<script>
// ── CLAVES localStorage ──────────────────────────────────────
const TOKEN_KEY = 'mw_token';
const USER_KEY  = 'mw_user';

// ── DETECTAR URL de redirección ──────────────────────────────
const params   = new URLSearchParams(window.location.search);
const redirect = params.get('redirect') || '/';

// ── LEER SESIÓN ACTUAL ───────────────────────────────────────
function getSession() {
  const token = localStorage.getItem(TOKEN_KEY);
  let user = null;
  try { user = JSON.parse(localStorage.getItem(USER_KEY) || 'null'); } catch(e) {}
  return { token, user };
}

// ── CERRAR SESIÓN ────────────────────────────────────────────
function logout() {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(USER_KEY);
  showLoginView();
}

// ── MOSTRAR VISTA LOGIN ──────────────────────────────────────
function showLoginView() {
  document.getElementById('login-view').style.display = 'block';
  document.getElementById('session-view').style.display = 'none';
}

// ── MOSTRAR VISTA SESIÓN ACTIVA ──────────────────────────────
function showSessionView(user) {
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('session-view').style.display = 'block';

  document.getElementById('sess-name').textContent  = user.name  || 'Usuario';
  document.getElementById('sess-email').textContent = user.email || '';

  const roleEl = document.getElementById('sess-role');
  if (user.role === 'admin') {
    roleEl.textContent = 'Administrador';
    roleEl.classList.add('admin');
    document.getElementById('btn-go-dest').textContent = 'Ir al panel admin';
    document.getElementById('btn-go-dest').onclick = () => window.location.href = '/admin/';
  } else {
    roleEl.textContent = 'Cliente';
    document.getElementById('btn-go-dest').textContent = 'Ver mis pedidos';
    document.getElementById('btn-go-dest').onclick = () => window.location.href = redirect !== '/' ? redirect : '/orders.html';
  }

  document.getElementById('btn-go-home').onclick = () => window.location.href = '/';
  document.getElementById('btn-logout').onclick   = logout;
}

// ── VERIFICAR SESIÓN AL CARGAR ───────────────────────────────
(function checkSession() {
  const { token, user } = getSession();
  if (token && user) {
    showSessionView(user);
  }
  // Si no hay sesión → queda en el formulario de login
})();

// ── ENVÍO DEL FORMULARIO ─────────────────────────────────────
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('submit-btn');
  const errorEl  = document.getElementById('error-msg');

  errorEl.classList.remove('show');
  btn.disabled    = true;
  btn.textContent = 'Ingresando...';

  try {
    const API_BASE = window.location.origin + '/api';
    const res = await fetch(`${API_BASE}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.message || 'Credenciales incorrectas. Verifica tu email y contraseña.');
    }

    // Guardar sesión
    localStorage.setItem(TOKEN_KEY, data.token);
    localStorage.setItem(USER_KEY, JSON.stringify(data.user));

    // Redirigir
    if (data.user.role === 'admin') {
      window.location.href = '/admin/';
    } else {
      window.location.href = redirect !== '/login.html' ? redirect : '/';
    }

  } catch (err) {
    errorEl.textContent = err.message || 'Error al conectar con el servidor.';
    errorEl.classList.add('show');
    btn.disabled    = false;
    btn.textContent = 'Ingresar';
  }
});
</script>
</body>
</html>
