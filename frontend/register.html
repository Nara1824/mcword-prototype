<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse — MacWorld Ecuador</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

<div class="auth-container">
  <a href="/" class="auth-logo">MacWorld EC</a>

  <div class="auth-card">
    <h1 class="auth-title">Crear cuenta</h1>
    <p class="auth-sub">Guarda tu historial de pedidos y compra mas rapido</p>

    <div class="alert alert-error"   id="error-msg"   style="display:none"></div>
    <div class="alert alert-success" id="success-msg" style="display:none"></div>

    <form id="register-form">
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" id="name" placeholder="Tu nombre" required maxlength="100">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="tu@email.com" required>
      </div>

      <div class="form-group">
        <label>WhatsApp (opcional)</label>
        <input type="tel" id="phone" placeholder="0991234567">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Minimo 6 caracteres" required minlength="6">
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
        Crear cuenta gratis
      </button>
    </form>

    <p class="auth-footer">
      ¿Ya tienes cuenta? <a href="/login.html">Ingresar</a>
    </p>
  </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = '/';

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const name     = document.getElementById('name').value;
    const email    = document.getElementById('email').value;
    const phone    = document.getElementById('phone').value;
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submit-btn');
    const errorEl  = document.getElementById('error-msg');

    btn.disabled    = true;
    btn.textContent = 'Creando cuenta...';
    errorEl.style.display = 'none';

    try {
      const res = await API.auth.register({ name, email, password, phone });

      Auth.setSession(res.token, res.user);
      window.location.href = '/';
    } catch (err) {
      errorEl.textContent   = err.message || 'Error al crear la cuenta.';
      errorEl.style.display = 'block';
      btn.disabled          = false;
      btn.textContent       = 'Crear cuenta gratis';
    }
  });
</script>
</body>
</html>
